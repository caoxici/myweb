<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaughn.C LAB · 科技进步·开拓AI新世界</title>
    <!-- 引用外部样式表 -->
    <link rel="stylesheet" href="/myweb/style.css">
</head>
<body>
<div class="container">
    <header class="hero">
        <!-- 打字机效果容器 -->
        <div class="typewriter">
            <h1 id="main-title">Vaughn.C <span>LAB</span></h1>
        </div>
        <div class="subhead">科技进步·开拓AI新世界！</div>
    </header>

    <div class="content">
        <div class="section-header">
            <div class="section-header-left">
                <h2>📑 近期文章</h2>
                <a href="/myweb/archive.html" class="all-posts-link">📂 全部文章 →</a>
            </div>
            <span class="badge" id="article-counter">加载中…</span>
        </div>

        <div id="articles-container" class="article-list">
            <div class="status-box">⏳ 正在加载实验室最新研究…</div>
        </div>

        <footer class="footer">
            <span>Vaughn.C LAB · 开放学术 · </span>
            <a href="/myweb/">首页</a> · 
            <span id="refresh-note">更新 posts.json 即刻刷新</span>
        </footer>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ---------- 打字机动画收尾：动画结束后移除光标 ----------
        const titleEl = document.getElementById('main-title');
        if (titleEl) {
            titleEl.addEventListener('animationend', function(e) {
                if (e.animationName === 'typing') {
                    titleEl.classList.add('typed');
                }
            });
        }

        // ---------- 文章加载与渲染（移除文件名显示）----------
        const container = document.getElementById('articles-container');
        const counterSpan = document.getElementById('article-counter');

        const FALLBACK_ARTICLES = [
            {
                "title": "贝叶斯深度学习在气候归因中的不确定性量化",
                "date": "2026-03-10",
                "summary": "提出物理约束贝叶斯网络，提升极端降水归因可信度。",
                "filename": "2026-03-10-bayesian-climate.md",
                "tag": "preprint",
                "author": "Vaughn Chen"
            },
            {
                "title": "单细胞拓扑数据分析揭示发育轨迹",
                "date": "2026-02-18",
                "summary": "基于持续同调构建细胞分化高阶表征。",
                "filename": "2026-02-18-topology-scrna.md",
                "tag": "research",
                "author": "Vaughn Chen"
            }
        ];

        function escapeHtml(text) {
            if (!text) return text;
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            if (parts.length === 3) {
                return `${parts[0]}年${parseInt(parts[1])}月${parseInt(parts[2])}日`;
            }
            return dateStr;
        }

        // 生成作者链接 HTML
        function formatAuthors(authorString) {
            if (!authorString) return '<span class="article-authors">未知作者</span>';
            const authors = authorString.split(',').map(a => a.trim()).filter(a => a);
            const links = authors.map(author => {
                return `<a href="/myweb/author.html?name=${encodeURIComponent(author)}" class="author-link">${escapeHtml(author)}</a>`;
            });
            let html = '';
            links.forEach((link, idx) => {
                if (idx > 0) html += '<span class="author-separator">, </span>';
                html += link;
            });
            return html;
        }

        function renderArticles(articlesArray) {
            if (!articlesArray || articlesArray.length === 0) {
                container.innerHTML = `<div class="status-box">📭 暂无文章，请在 /myweb/posts.json 中添加条目</div>`;
                counterSpan.textContent = `0 篇`;
                return;
            }

            const sorted = [...articlesArray].sort((a, b) => {
                return (b.date || '').localeCompare(a.date || '');
            });

            const recent = sorted.slice(0, 10);
            counterSpan.textContent = `近 ${recent.length} 篇 · 最新`;

            let html = '';
            recent.forEach(item => {
                const title = item.title || '未命名文章';
                const dateRaw = item.date || '';
                const summary = item.summary || '暂无摘要。';
                const filename = item.filename || '';
                const articleUrl = filename ? `/myweb/post/${encodeURIComponent(filename)}` : '#';
                const displayDate = formatDate(dateRaw);
                const tag = item.tag || '';
                const authorsHtml = formatAuthors(item.author);

                // 注意：这里不再显示文件名（之前有 .article-filename）
                html += `
                    <article class="article-card">
                        <div class="article-meta">
                            ${displayDate ? `<span class="article-date">📅 ${displayDate}</span>` : ''}
                            ${tag ? `<span style="color:#4f748e;">#${escapeHtml(tag)}</span>` : ''}
                        </div>
                        <div class="article-authors" style="margin-bottom: 4px;">
                            ✍️ ${authorsHtml}
                        </div>
                        <h3 class="article-title">
                            <a href="${escapeHtml(articleUrl)}" target="_blank" rel="noopener">${escapeHtml(title)}</a>
                        </h3>
                        <p class="article-summary">${escapeHtml(summary)}</p>
                    </article>
                `;
            });

            container.innerHTML = html;
        }

        function useFallback(errorMsg) {
            console.warn('posts.json 加载失败，使用内置示例。', errorMsg);
            container.innerHTML = `<div class="error-box">⚠️ 无法载入文章索引 (posts.json) ，显示示例数据。<br>
            <span style="font-size:0.9rem;">请确保 /myweb/posts.json 存在且格式正确。</span></div>`;
            renderArticles(FALLBACK_ARTICLES);
        }

        async function loadArticles() {
            try {
                const response = await fetch(`/myweb/posts.json?t=${Date.now()}`, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (Array.isArray(data)) {
                    renderArticles(data);
                } else {
                    throw new Error('posts.json 格式错误，期望一个数组');
                }
            } catch (err) {
                useFallback(err.message);
            }
        }

        loadArticles();
    })();
</script>
</body>
</html>
